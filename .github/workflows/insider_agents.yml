name: Insider Agent Bisettimanale

on:
  schedule:
    - cron: "0 7 * * 1"
    - cron: "0 7 * * 4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run"
        required: false
        default: false
        type: boolean

jobs:
  run-insider:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:        ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONHTTPSVERIFY: "0"
        run: |
          DRY_RUN_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi
          python insider_report.py $DRY_RUN_ARG
