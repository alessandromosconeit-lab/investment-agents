name: Investment Agents Bisettimanale

on:
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 6 * * 4"
  workflow_dispatch:
    inputs:
      agent:
        description: "Agente da eseguire"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - value
          - growth
          - quality
      dry_run:
        description: "Dry run"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Esegui agenti
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONHTTPSVERIFY: "0"
        run: |
          AGENT_ARG=""
          DRY_RUN_ARG=""
          if [ -n "${{ github.event.inputs.agent }}" ]; then
            AGENT_ARG="--agent ${{ github.event.inputs.agent }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi
          python main.py $AGENT_ARG $DRY_RUN_ARG

      - name: Commit dati dashboard
        run: |
          git config user.name  "Investment Agents Bot"
          git config user.email "bot@investment-agents"
          git add data/ || true
          git diff --staged --quiet || git commit -m "Update dashboard data $(date +%Y-%m-%d)"
          git push || true
