name: Investment Agents — Bisettimanale

on:
  # Lunedì e Giovedì alle 06:00 UTC = 07:00 CET (08:00 CEST in estate)
  schedule:
    - cron: "0 6 * * 1"   # Lunedì
    - cron: "0 6 * * 4"   # Giovedì

  # Esecuzione manuale dalla tab Actions su GitHub
  workflow_dispatch:
    inputs:
      agent:
        description: "Agente da eseguire (lascia vuoto per tutti)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - value
          - growth
          - quality
      dry_run:
        description: "Dry run — genera report senza inviare email"
        required: false
        default: false
        type: boolean

jobs:
  run-agents:
    name: Esegui Investment Agents
    runs-on: ubuntu-latest
    timeout-minutes: 120   # max 2 ore per fetch + analisi dell'intero universo

    steps:
      # 1. Checkout del repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python 3.11
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Installa dipendenze
      - name: Installa dipendenze
        run: pip install -r requirements.txt

      # 4. Esegui gli agenti
      - name: Esegui Investment Agents
        env:
          FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      env:
          FMP_API_KEY:        ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONHTTPSVERIFY:  "0"
        run: |
          AGENT_ARG=""
          DRY_RUN_ARG=""

          # Agente specifico (solo per workflow_dispatch)
          if [ -n "${{ github.event.inputs.agent }}" ]; then
            AGENT_ARG="--agent ${{ github.event.inputs.agent }}"
          fi

          # Dry run (solo per workflow_dispatch)
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          python main.py $AGENT_ARG $DRY_RUN_ARG

      # 5. Upload log come artefatto (utile per debug)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
          if-no-files-found: ignore
