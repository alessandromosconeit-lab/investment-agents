name: Investment Agents Bisettimanale

on:
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 6 * * 4"
  workflow_dispatch:
    inputs:
      agent:
        description: "Agente da eseguire"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - value
          - growth
          - quality
      dry_run:
        description: "Dry run"
        required: false
        default: false
        type: boolean

jobs:
  run-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PYTHONHTTPSVERIFY: "0"
        run: |
          AGENT_ARG=""
          DRY_RUN_ARG=""
          if [ -n "${{ github.event.inputs.agent }}" ]; then
            AGENT_ARG="--agent ${{ github.event.inputs.agent }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi
          python main.py $AGENT_ARG $DRY_RUN_ARG